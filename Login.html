<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title -->
    <title>Word Scramble Game - Login</title>

    <!-- Styles -->
    <link rel="stylesheet" href="Login.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

    <!-- Script -->
    <script src="Js/Login.js" defer></script>
</head>

<body>
    <!-- Background Music -->
    <audio id="bgMusic" loop>
        <source src="bg-music.mp3" type="audio/mpeg">
    </audio>

    <div class="bg">
        <!-- Navigation -->
        <div class="nav">
            <img src="../logo.png" alt="Game Logo" class="logo">
            <button id="musicBtn" class="music-btn" type="button">🔊</button>
        </div>

        <!-- Main Container -->
        <div class="container">

            <!-- Login Form -->
            <div class="form-box login">
                <form id="loginForm" action="#">
                    <h1>Login</h1>

                    <div class="input-box">
                        <input type="text" name="username" placeholder="Username" required>
                        <i class="bx bxs-user"></i>
                    </div>

                    <div class="input-box">
                        <input type="password" name="password" placeholder="Password" required>
                        <i class="bx bxs-lock-alt"></i>
                    </div>

                    <div class="forgot-link">
                        <a href="#">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn">Login</button>

                    <p>or login with social platforms</p>

                    <div class="social-icons">
                        <a href="#"><i class="bx bxl-google"></i></a>
                        <a href="#"><i class="bx bxl-facebook"></i></a>
                        <a href="#"><i class="bx bxl-github"></i></a>
                        <a href="#"><i class="bx bxl-linkedin"></i></a>
                    </div>
                </form>
            </div>

            <!-- Register Form -->
            <div class="form-box register">
                <form action="#">
                    <h1>Registration</h1>

                    <div class="input-box">
                        <input type="text" name="username" placeholder="Username" required>
                        <i class="bx bxs-user"></i>
                    </div>

                    <div class="input-box">
                        <input type="email" name="email" placeholder="Email" required>
                        <i class="bx bxs-envelope"></i>
                    </div>

                    <div class="input-box">
                        <input type="password" name="password" placeholder="Password" required>
                        <i class="bx bxs-lock-alt"></i>
                    </div>

                    <button type="submit" class="btn">Register</button>

                    <p>or register with social platforms</p>

                    <div class="social-icons">
                        <a href="#"><i class="bx bxl-google"></i></a>
                        <a href="#"><i class="bx bxl-facebook"></i></a>
                        <a href="#"><i class="bx bxl-github"></i></a>
                        <a href="#"><i class="bx bxl-linkedin"></i></a>
                    </div>
                </form>
            </div>

            <!-- Toggle Panel -->
            <div class="toggle-box">
                <div class="toggle-panel toggle-left">
                    <h1>Hello, Welcome!</h1>
                    <p>Don't have an account?</p>
                    <button class="btn register-btn" type="button">Register</button>
                </div>

                <div class="toggle-panel toggle-right">
                    <h1>Welcome Back!</h1>
                    <p>Already have an account?</p>
                    <button class="btn login-btn" type="button">Login</button>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
